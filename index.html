<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Foxboro Modernization Simulator V3</title>
<link rel="stylesheet" href="css/main.css">
</head>
<body>
<header>
<h1>RASCO Foxboro Pneumatic System Modernization Simulator</h1>
</header>

<nav>
<a href="index.html">Home</a>
<a href="scenarios/scenario1.html">Legacy</a>
<a href="scenarios/scenario2.html">Modular</a>
<a href="scenarios/scenario3.html">Electronic</a>
<a href="scenarios/scenario4.html">SCADA</a>
<a href="scenarios/cabinet.html">Cabinet</a>
<a href="scenarios/failures.html">Failures</a>
</nav>

<section>
<h2>Live Loop Simulation</h2>

<select id="loop">
<option>TE-1008 RTD Recorder Loop</option>
<option>TE-101A Furnace Controller Loop</option>
</select>

<br><br>

Temperature:
<input id="temp" type="range" min="0" max="100" value="50">

<div class="dashboard">
<div>Temperature: <span id="t">50</span> °C</div>
<div>Signal: <span id="m">12.00</span> mA</div>
<div>Output: <span id="p">9.00</span> PSI</div>
<div>Status: <span id="status">Healthy</span></div>
</div>

<canvas id="trend" width="900" height="250"></canvas>

<svg width="900" height="220">
<rect x="50" y="90" width="120" height="60"/>
<text x="80" y="125">RTD/TC</text>

<rect x="250" y="90" width="120" height="60"/>
<text x="285" y="125">VJR6</text>

<rect x="450" y="90" width="120" height="60"/>
<text x="485" y="125">PH10</text>

<rect x="650" y="90" width="160" height="60"/>
<text x="680" y="125">Controller</text>

<line x1="170" y1="120" x2="250" y2="120" class="blue animate"/>
<line x1="370" y1="120" x2="450" y2="120" class="green animate"/>
<line x1="570" y1="120" x2="650" y2="120" class="orange animate"/>
</svg>

</section>

<script src="js/simulator.js"></script>
<script src="js/trend.js"></script>
<script src="js/failures.js"></script>
</body>
</html>
